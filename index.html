<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=mobile_fix_9">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo" onclick="resetToHome()" style="cursor: pointer;">
                    <i data-lucide="bar-chart-2" class="brand-icon"></i>
                    <h1>Youtube Channel Analyzer</h1>
                    <div class="social-links" id="social-links-container" onclick="event.stopPropagation()">
                        <a href="https://www.youtube.com/" target="_blank" class="social-btn" title="YouTube 홈"><i
                                data-lucide="youtube"></i></a>
                        <a href="https://www.tiktok.com/" target="_blank" class="social-btn" title="TikTok"><i
                                data-lucide="music-2"></i></a>
                        <a href="https://www.instagram.com/" target="_blank" class="social-btn" title="Instagram"><i
                                data-lucide="instagram"></i></a>
                        <!-- Extensions -->
                        <a href="https://www.threads.net/" target="_blank" class="social-btn" title="Threads"><i
                                data-lucide="at-sign"></i></a>
                        <a href="https://www.facebook.com/" target="_blank" class="social-btn" title="Facebook"><i
                                data-lucide="facebook"></i></a>
                        <button id="add-shortcut-btn" class="social-btn add-btn" title="바로가기 추가">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- API Key & Settings Section -->
            <div class="settings-group">
                <input type="file" id="config-upload" accept=".json" class="hidden" />

                <button id="import-config-btn" class="btn btn-secondary btn-sm btn-icon-only" title="설정 가져오기 (Upload)">
                    <i data-lucide="upload"></i>
                </button>
                <button id="export-config-btn" class="btn btn-secondary btn-sm btn-icon-only"
                    title="설정 내보내기 (Download)">
                    <i data-lucide="download"></i>
                </button>

                <div class="api-key-wrapper">
                    <button id="toggle-api-key-btn" class="btn btn-secondary btn-sm" title="API Key 설정">
                        <i data-lucide="key"></i> <span class="desktop-text">API Key</span>
                    </button>
                    <div id="api-key-container" class="api-key-dropdown hidden">
                        <div class="api-key-inner">
                            <input type="password" id="api-key-input" placeholder="API Key 입력" />
                            <button id="save-api-key" class="btn btn-primary btn-sm">저장</button>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    </header>

    <!-- Main Content -->
    <main class="main-content app-container">
        <!-- Search Section -->
        <section class="search-section">
            <div class="search-bar-wrapper">
                <input type="text" id="channel-url-input"
                    placeholder="분석할 유튜브 채널 URL을 입력하세요 (예: https://www.youtube.com/@GoogleDevelopers)" />
                <button id="analyze-btn" class="btn btn-primary">검색</button>
                <button id="favorites-list-btn" class="btn btn-secondary" title="즐겨찾기 목록">
                    <i data-lucide="star"></i>
                </button>
            </div>
            <div id="recent-searches-container" class="recent-searches-container">
                <!-- Recent searches will be injected here -->
            </div>
            <div id="error-message" class="error-message hidden"></div>
        </section>

        <!-- Custom Image Section (New) -->
        <section class="custom-image-section">
            <div id="custom-image-display" class="custom-image-display hidden">
                <div class="picture-frame">
                    <img id="custom-image-img" src="" alt="Custom Display" />
                </div>
            </div>
            <div class="custom-image-controls">
                <input type="file" id="custom-image-input" accept="image/*" class="hidden" />
                <button id="add-custom-image-btn" class="btn btn-secondary btn-sm" title="이미지 꾸미기">
                    <i data-lucide="image"></i> 이미지 추가/변경
                </button>
                <button id="remove-custom-image-btn" class="btn btn-secondary btn-sm hidden" title="이미지 삭제">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </section>

        <!-- Loading Indicator -->
        <div id="loading-indicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <p id="loading-text">데이터 분석 중...</p>
        </div>

        <!-- Results Section -->
        <section id="results-section" class="results-section hidden">
            <!-- Channel Context -->
            <div class="channel-context">
                <div class="channel-profile">
                    <img id="channel-thumbnail" src="" alt="Profile" />
                    <div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <h2 id="channel-title">Channel Name</h2>
                            <button id="toggle-favorite-btn" class="btn-icon-subtle" title="즐겨찾기 추가/해제">
                                <i data-lucide="star"></i>
                            </button>
                        </div>
                        <p id="channel-description">Channel Description</p>
                    </div>
                </div>
                <div class="channel-summary-pill">
                    <div class="stat-pill">
                        <span class="label">일 평균 업로드</span>
                        <span class="value" id="daily-upload-avg">-</span>
                    </div>
                    <div class="divider"></div>
                    <div class="stat-pill">
                        <span class="label">총 조회수</span>
                        <span class="value" id="view-count">-</span>
                    </div>
                    <div class="divider"></div>
                    <div class="stat-pill">
                        <span class="label" title="Long: 2원 / Shorts: 0.15원 적용">예상 월 수익 (최근30일)</span>
                        <span class="value revenue-text" id="estimated-revenue">-</span>
                    </div>
                    <div class="stat-pill action-icons" style="display: flex; gap: 0.5rem; margin-left: auto;">
                        <button id="export-btn" class="btn-icon-circle" title="엑셀 저장">
                            <i data-lucide="file-spreadsheet"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Keyword Analysis Section -->
            <div id="keyword-analysis-section" class="keyword-section hidden">
                <!-- Injected by script.js -->
            </div>

            <!-- Charts Area -->
            <div class="charts-area">
                <div class="chart-container">
                    <div class="chart-header">
                        <h3>📅 업로드 추이</h3>
                        <div class="chart-options-group">
                            <div class="toggle-group">
                                <button id="view-daily-btn" class="toggle-btn active">일별</button>
                                <button id="view-monthly-btn" class="toggle-btn">월별</button>
                            </div>
                            <div class="chart-nav">
                                <button id="chart-prev" class="btn-icon"><i data-lucide="chevron-left"></i></button>
                                <span id="chart-range-label">최근 30일</span>
                                <button id="chart-next" class="btn-icon"><i data-lucide="chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                    <canvas id="uploadChart"></canvas>
                </div>
            </div>

            <!-- Video List Table -->
            <div class="video-list-container">
                <table class="video-table">
                    <thead>
                        <tr>
                            <th width="60">No.</th>
                            <th width="80">썸네일</th>
                            <th>영상 제목</th>
                            <th width="80" class="sortable" data-sort="duration">길이 <i data-lucide="arrow-up-down"
                                    class="sort-icon"></i></th>
                            <th width="120" class="sortable" data-sort="date">업로드일 <i data-lucide="arrow-up-down"
                                    class="sort-icon"></i></th>
                            <th width="100" class="sortable" data-sort="views">조회수 <i data-lucide="arrow-up-down"
                                    class="sort-icon"></i></th>
                            <th width="100" class="sortable" data-sort="likes">좋아요 <i data-lucide="arrow-up-down"
                                    class="sort-icon"></i></th>
                            <th width="80" class="sortable" data-sort="comments">댓글 <i data-lucide="arrow-up-down"
                                    class="sort-icon"></i></th>
                        </tr>
                    </thead>
                    <tbody id="video-table-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    </div>

    <!-- Universal Modal -->
    <div id="universal-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>

            <!-- Video Container -->
            <div id="modal-video-container" class="modal-body hidden">
                <div class="video-frame-container">
                    <iframe id="video-iframe" width="100%" height="100%" src="" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>
                <div class="modal-footer">
                    <button id="modal-download-btn" class="btn btn-download">
                        <i data-lucide="download"></i> 영상 다운로드 (화질선택)
                    </button>
                    <button id="modal-download-script-btn" class="btn btn-script">
                        <i data-lucide="file-text"></i> 대본 다운로드
                    </button>
                    <a id="external-link-btn" href="#" target="_blank" class="btn btn-secondary">
                        <i data-lucide="external-link"></i> YouTube에서 보기 (재생 오류 시)
                    </a>
                </div>
            </div>

            <div id="modal-comments-container" class="modal-body hidden">
                <h3>💬 댓글 목록</h3>
                <div id="comments-list" class="comments-list">
                    <!-- Comments injected here -->
                </div>
            </div>

            <!-- Favorites Container -->
            <div id="modal-favorites-container" class="modal-body hidden">
                <h2 style="margin-bottom: 1.5rem;">⭐ 즐겨찾기 목록</h2>

                <!-- Category Input -->
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <input type="text" id="new-category-input" placeholder="새 카테고리 이름"
                        style="flex: 1; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px;" />
                    <button id="add-category-btn" class="btn btn-primary btn-sm">추가</button>
                </div>

                <!-- Category Tabs (Missing previously) -->
                <div id="favorites-category-tabs" class="favorites-category-tabs">
                    <!-- Tabs injected here -->
                </div>

                <div id="favorites-list-container" class="favorites-list">
                    <!-- Favorites injected here -->
                </div>
            </div>

            <!-- Keyword Analysis Container -->
            <div id="modal-keyword-container" class="modal-body hidden">
                <h3>🔑 키워드 분석 리포트</h3>
                <div id="keyword-detail-view">
                    <!-- Detailed stats injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Shortcut Modal -->
    <div id="shortcut-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px; padding: 2rem;">
            <span class="close-modal close-shortcut">&times;</span>
            <h3 style="margin-bottom: 1.5rem;">바로가기 관리</h3>

            <div id="shortcut-list-container" class="shortcut-list-container">
                <!-- List injected here -->
            </div>

            <div class="shortcut-form-divider"></div>

            <h4 style="margin-bottom: 1rem; font-size: 0.95rem; color: var(--text-secondary);">새 바로가기 추가 / 수정</h4>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" id="shortcut-edit-index" value="-1">
                <input type="text" id="shortcut-name" placeholder="이름 (예: Twitter)" />
                <input type="text" id="shortcut-url" placeholder="URL (예: https://twitter.com)" />
                <div style="display: flex; gap: 0.5rem;">
                    <button id="save-shortcut-btn" class="btn btn-primary" style="flex: 1;">저장하기</button>
                    <button id="cancel-edit-btn" class="btn btn-secondary hidden" style="flex: 1;">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
